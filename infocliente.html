<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Información del Cliente</title>
    <link rel="stylesheet" href="dashboard.css" />
    <style>
      .delete-btn {
          width: 100%;
          background-color: #ff3b30;
          color: white;
          padding: 14px;
          border: none;
          border-radius: 12px;
          font-size: 16px;
          margin-top: 25px;
          cursor: pointer;
          font-weight: 600;
      }

      .delete-btn:active {
          background-color: #d32f2f;
      }

      .modal-ios {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0,0,0,0.45);
          display: none;
          justify-content: center;
          align-items: center;
          z-index: 999;
      }

      .modal-content-ios {
          background: #f2f2f7;
          padding: 20px;
          border-radius: 16px;
          width: 85%;
          max-width: 320px;
          text-align: center;
          box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      }

      .modal-btn {
          width: 100%;
          padding: 12px;
          border-radius: 12px;
          border: none;
          margin-top: 10px;
          font-size: 16px;
          cursor: pointer;
      }

      .modal-btn-danger {
          background-color: #ff3b30;
          color: white;
      }

      .modal-btn-cancel {
          background-color: #d1d1d6;
          color: #333;
      }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
      <h1 class="header-title">Cliente</h1>
    </header>

    <!-- Content -->
    <div class="content-area">

      <!-- Nombre del cliente -->
      <p class="welcome-label">Perfil</p>
      <h2 id="info-nombre" class="welcome-title">Cargando...</h2>

      <!-- Datos personales -->
      <div class="lista-ios" style="margin-top: 20px;">
        <div class="cliente-item">
          Número
          <span id="info-numero" class="flecha" style="color: var(--ios-text-secondary);"></span>
        </div>

        <div class="cliente-item">
          Teléfono
          <span id="info-telefono" class="flecha" style="color: var(--ios-text-secondary);"></span>
        </div>

        <div class="cliente-item">
          Dirección
          <span id="info-direccion" class="flecha" style="color: var(--ios-text-secondary);"></span>
        </div>
      </div>

      <!-- Historial -->
      <h2 class="welcome-title" style="margin-top: 30px;">Historial</h2>

      <div class="lista-ios">
        <div class="cliente-item">
          Botellones comprados
          <span id="info-botellones" class="flecha" style="color: var(--ios-text-secondary);"></span>
        </div>

        <div class="cliente-item">
          Última recarga
          <span id="info-ultima" class="flecha" style="color: var(--ios-text-secondary);"></span>
        </div>

        <div class="cliente-item">
          Regalados
          <span id="info-regalados" class="flecha" style="color: var(--ios-text-secondary);"></span>
        </div>
      </div>

      <!-- Acciones -->
      <h2 class="welcome-title" style="margin-top: 30px;">Acciones</h2>

      <form class="form-ios">
        <div class="form-group">
          <label class="form-label">Agregar recargas</label>
          <input type="number" id="cantidadRecargas" class="form-input" placeholder="Ej: 1" />
        </div>

        <button type="button" class="btn-primary" onclick="agregarRecargasDesdeInfo()">Agregar</button>
      </form>

      <div class="form-ios" style="margin-top: 20px;">
        <button class="btn-primary" onclick="sumarRegalado()">Sumar regalado</button>
        <button class="btn-primary" onclick="quitarRegalado()" style="background-color: #ff3b30;">Quitar regalado</button>
      </div>

      <button class="delete-btn" onclick="abrirModalEliminar()">
        Eliminar cliente
      </button>

      <!-- Back -->
      <div class="logout-wrapper">
        <button type="button" class="logout-btn" onclick="location.href='clientes.html'">
          ← Volver a Clientes
        </button>
      </div>

      <!-- Notificación estilo iPhone -->
      <div id="mensajeNotificacion" class="toast-ios">Mensaje</div>

    </div>

    <!-- Modal de confirmación estilo iOS -->
    <div id="modalEliminar" class="modal-ios">
      <div class="modal-content-ios">
        <p>¿Seguro que deseas eliminar este cliente?</p>

        <button class="modal-btn modal-btn-danger" id="confirmarEliminar">
          Eliminar cliente
        </button>

        <button class="modal-btn modal-btn-cancel" onclick="cerrarModalEliminar()">
          Cancelar
        </button>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="dashboard.js"></script>

    <script>
        window.addEventListener("load", () => {
            cargarCliente(); // SOLO esto, nada más
        });

        function abrirModalEliminar() {
            document.getElementById("modalEliminar").style.display = "flex";
            document.getElementById("confirmarEliminar").onclick = function () {
                eliminarClientePorID(localStorage.getItem("clienteSeleccionadoID"));
            };
        }

        function cerrarModalEliminar() {
            document.getElementById("modalEliminar").style.display = "none";
        }
    </script>

</body>
</html>
