<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Manager</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e90ff">
</head>


<body>

  <!-- Header -->
  <header class="header">
    <h1 class="header-title">Customer Manager</h1>
  </header>

  <!-- Content -->
  <div class="content-area">

    <!-- Welcome -->
    <p class="welcome-label">Welcome back</p>
    <h2 class="welcome-title">Dashboard</h2>

    <!-- Cards -->
    <nav aria-label="Dashboard navigation">
      <ul class="cards-list">

        <!-- Register Client -->
        <li>
          <button type="button" class="dashboard-card" onclick="location.href='registrar.html'">
            <div class="card-icon card-icon--blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <line x1="19" y1="8" x2="19" y2="14"></line>
                <line x1="22" y1="11" x2="16" y2="11"></line>
              </svg>
            </div>
            <div class="card-text">
              <span class="card-title">Register Client</span>
              <span class="card-subtitle">Add a new client</span>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </li>

        <!-- Client List -->
        <li>
          <button type="button" class="dashboard-card" onclick="location.href='clientes.html'">
            <div class="card-icon card-icon--green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </div>
            <div class="card-text">
              <span class="card-title">Client List</span>
              <span class="card-subtitle">View all clients</span>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </li>

        <!-- Inactive Clients -->
        <li>
          <button type="button" class="dashboard-card" onclick="location.href='inactivos.html'">
            <div class="card-icon" style="background-color: #FFD60A; color: #000;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="6" x2="12" y2="12"></line>
                <line x1="12" y1="12" x2="16" y2="14"></line>
              </svg>
            </div>
            <div class="card-text">
              <span class="card-title">Inactive Clients</span>
              <span class="card-subtitle">No recent activity</span>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </li>


        <!-- History -->
        <li>
          <button type="button" class="dashboard-card" onclick="location.href='historial.html'">
            <div class="card-icon card-icon--orange">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </div>
            <div class="card-text">
              <span class="card-title">History</span>
              <span class="card-subtitle">Recent activity</span>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </li>

        <!-- Statistics -->
        <li>
          <button type="button" class="dashboard-card" onclick="location.href='estadisticas.html'">
            <div class="card-icon card-icon--violet">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
              </svg>
            </div>
            <div class="card-text">
              <span class="card-title">Statistics</span>
              <span class="card-subtitle">Analytics and insights</span>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </li>

        <li>
          <button type="button" class="dashboard-card" onclick="location.href='calculadora.html'">
            <div class="card-icon card-icon--blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 4H4v16h16V4z"></path>
                <path d="M8 10h8"></path>
                <path d="M8 14h5"></path>
              </svg>
            </div>
            <div class="card-text">
              <span class="card-title">Price Calculator</span>
              <span class="card-subtitle">Bottle totals</span>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </li>


      </ul>
    </nav>

    <li>
  

      <!-- Logout -->
      <div class="logout-wrapper">
        <button type="button" class="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </button>
      </div>

    </div>

    <!-- Backup Section -->
    <div class="backup-wrapper">

      <!-- Exportar respaldo -->
      <button type="button" class="dashboard-card" onclick="exportarRespaldo()">
        <div class="card-icon card-icon--blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14"></path>
            <path d="M5 12l7 7 7-7"></path>
          </svg>
        </div>
        <div class="card-text">
          <span class="card-title">Export Backup</span>
          <span class="card-subtitle">Download .json file</span>
        </div>
        <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
      </button>

      <!-- Importar respaldo -->
      <input type="file" id="archivoRespaldo" accept=".json" style="display:none" onchange="importarRespaldo(event)">
      <button type="button" class="dashboard-card" onclick="document.getElementById('archivoRespaldo').click()">
        <div class="card-icon card-icon--green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5"></path>
            <path d="M19 12l-7-7-7 7"></path>
          </svg>
        </div>
        <div class="card-text">
          <span class="card-title">Import Backup</span>
          <span class="card-subtitle">Restore saved data</span>
        </div>
        <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
      </button>

    </div>
    <div id="toast"></div>



  <script src="app.js"></script>
  <script src="dashboard.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
